version: 2
project_name: smart-router

before:
  hooks:
    - go mod tidy

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

env:
  - CGO_ENABLED=0
  - GOAMD64=v3
  - GOARM64=v8.2

builds:
  - id: smartrouter
    binary: smartrouter
    dir: cmd/smartrouter
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: ppc64le
    flags:
      - -mod=readonly
      - -trimpath
    ldflags:
      - -w
      - -s
      - -X github.com/magma-Devs/smart-router/version.Version={{ .Tag }}
      - -X github.com/magma-Devs/smart-router/version.Commit={{ .FullCommit }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: smartrouter
    ids:
      - smartrouter
    formats:
      - binary
    name_template: '{{ .Binary }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}-{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'

# dockers_v2 (v2.15+) replaces the per-arch dockers: + docker_manifests:
# combo with a single block. GoReleaser stages each platform's binary at
# `linux/<arch>/smartrouter` in the build context, and Dockerfile.release
# resolves the right one via $TARGETPLATFORM. The multi-arch manifest is
# created automatically from the platforms list.
#
# :latest is guarded on `not .Prerelease` so RC / alpha / beta tags
# publish their per-version image but do not overwrite the stable
# :latest pointer (requires release.prerelease: auto, set below).
dockers_v2:
  - id: smartrouter
    ids:
      - smartrouter
    images:
      - ghcr.io/magma-devs/smart-router
    tags:
      - "{{ .Tag }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    dockerfile: Dockerfile.release
    platforms:
      - linux/amd64
      - linux/arm64
    # annotations land on the multi-arch manifest (modern OCI surface).
    # labels are mirrored onto the per-arch image config so older tools
    # that read `docker inspect --format '{{.Config.Labels}}'` (some
    # image scanners, ops runbooks) still see the version metadata.
    annotations:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Tag }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
    labels:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Tag }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"

checksum:
  name_template: "sha256sum.txt"
  algorithm: sha256

changelog:
  use:
    github
  sort: asc
  groups:
    - title: Dependency updates
      regexp: '^.*?(feat|fix|chore)\(deps\)!?:.+$'
      order: 300
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 100
    - title: "Security updates"
      regexp: '^.*?sec(\(.+\))??!?:.+$'
      order: 150
    - title: "Bug fixes"
      regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
      order: 200
    - title: "Documentation updates"
      regexp: ^.*?docs?(\(.+\))??!?:.+$
      order: 400
    - title: "Build process updates"
      regexp: ^.*?(build|ci)(\(.+\))??!?:.+$
      order: 400
    - title: Other work
      order: 9999
  filters:
    exclude:
      - "^test:"
      - "^test\\("
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy

release:
  github:
    owner: magma-Devs
    name: smart-router
  replace_existing_draft: true
  name_template: "Smart Router v{{.Version}}"
  mode: replace
  draft: true
  # `auto` derives prerelease from the tag: vX.Y.Z is a final, vX.Y.Z-*
  # (e.g. v1.0.0-rc1, v1.0.0-beta.2) is a prerelease. The :latest Docker
  # tag in the dockers_v2 block is guarded on `not .Prerelease`, so RC
  # and beta tags don't overwrite the stable :latest pointer.
  prerelease: auto
