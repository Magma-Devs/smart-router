version: 2
project_name: smart-router

before:
  hooks:
    - go mod tidy

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

env:
  - CGO_ENABLED=0

builds:
  - id: smartrouter
    binary: smartrouter
    dir: cmd/smartrouter
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # GOAMD64=v3 (Haswell+: AVX2/BMI2/FMA) and GOARM64=v8.2 (FP16/dotprod)
    # match smartrouter.yml's dev-image build env. The top-level `env:`
    # block alone is NOT enough — goreleaser uses these per-build fields
    # to drive target selection. Without them, snapshot/release produces
    # baseline v1/v8.0 binaries regardless of `env: GOAMD64=...`.
    goamd64:
      - v3
    goarm64:
      - v8.2
    ignore:
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: ppc64le
    flags:
      - -mod=readonly
      - -trimpath
    ldflags:
      - -w
      - -s
      - -X github.com/magma-Devs/smart-router/version.Version={{ .Tag }}
      - -X github.com/magma-Devs/smart-router/version.Commit={{ .FullCommit }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: smartrouter
    ids:
      - smartrouter
    formats:
      - binary
    # With a single GOAMD64 level (v3) the .Amd64 suffix would land on
    # every amd64 archive name (smartrouter-v1.0.0-linux-amd64v3). Drop
    # the suffix clause since v3 is now the standard, not a variant.
    name_template: '{{ .Binary }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}-{{ . }}{{ end }}'

# dockers_v2 (v2.15+) replaces the per-arch dockers: + docker_manifests:
# combo with a single block. GoReleaser stages each platform's binary at
# `linux/<arch>/smartrouter` in the build context, and docker/Dockerfile.release
# resolves the right one via $TARGETPLATFORM. The multi-arch manifest is
# created automatically from the platforms list.
#
# Build-time NEVER pushes :latest. Every release is born a prerelease
# (release.prerelease: true below), so the tag-push build only ever
# publishes the per-version image (ghcr.io/...:vX.Y.Z). The :latest
# pointer is moved exactly once, later, when a release is manually
# graduated out of prerelease on GitHub — .github/workflows/graduate-latest.yml
# fires on the `released` event and re-points :latest to the graduated
# tag via `docker buildx imagetools create`. One :latest at a time,
# decided by graduation, not by tag push.
dockers_v2:
  - id: smartrouter
    ids:
      - smartrouter
    images:
      - ghcr.io/magma-devs/smart-router
    tags:
      - "{{ .Tag }}"
    dockerfile: docker/Dockerfile.release
    platforms:
      - linux/amd64
      - linux/arm64
    # annotations land on the multi-arch manifest (modern OCI surface).
    # labels are mirrored onto the per-arch image config so older tools
    # that read `docker inspect --format '{{.Config.Labels}}'` (some
    # image scanners, ops runbooks) still see the version metadata.
    annotations:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Tag }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
    labels:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Tag }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"

checksum:
  name_template: "sha256sum.txt"
  algorithm: sha256
  # SBOM integrity depends on the .sbom.json files being listed in this
  # checksum file, which cosign then signs (see `signs:` below).
  #
  # GoReleaser 2.x DOES fold `sbom`-type artifacts into the checksum file
  # automatically — verified by snapshot: each <binary>.sbom.json appears
  # here exactly once. We deliberately do NOT add a `checksum.extra_files`
  # glob for them: that double-counts (the sbom is both a pipeline artifact
  # AND matched by the glob), producing duplicate lines in sha256sum.txt.
  #
  # BUT this auto-inclusion is undocumented default behavior, not a
  # contract — a GoReleaser upgrade could silently drop it, shipping
  # unsigned SBOMs with no error. The release workflow guards against that
  # with a post-build assertion (grep the SBOMs out of sha256sum.txt, fail
  # the release if any are missing). See "Assert SBOMs are checksummed" in
  # .github/workflows/release.yml.

# CycloneDX SBOMs, one per released binary, generated by syft (installed on
# the release runner by anchore/sbom-action/download-syft in
# .github/workflows/release.yml). Each `<binary>.sbom.json` is uploaded
# as a release asset alongside the binary it describes. The SBOM files are
# covered by the same sha256sum.txt that cosign signs below, so an SBOM's
# integrity is verifiable through the existing signed-checksum chain — no
# separate signing step needed. Enterprise procurement / vuln-scanning
# tooling (Grype, Trivy, Dependency-Track) ingests these directly.
#
# artifacts MUST be `binary`, not `archive`: our `archives:` block uses
# `formats: [binary]`, so goreleaser emits `binary`-type artifacts and
# ZERO `archive`-type ones. Scoping the SBOM to `archive` matches nothing
# and silently ships no SBOMs (the v1.1.0 miss). `binary` yields one SBOM
# per OS/arch executable.
sboms:
  - id: binary-sboms
    artifacts: binary
    documents:
      - "{{ .ArtifactName }}.sbom.json"
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"

# docker_signs attests the pushed multi-arch image with cosign, keyless.
# For a k8s-deployed router the image is the artifact enterprises actually
# run, so it carries its own SBOM attestation rather than relying only on
# the binary release assets. We shell out to `scripts/attest-image-sbom.sh`,
# which runs syft against the pushed image to produce a CycloneDX SBOM and
# then `cosign attest --type cyclonedx` pushes it into GHCR alongside the
# image. Verifiable with:
#   cosign verify-attestation --type cyclonedx \
#     --certificate-identity-regexp 'https://github.com/magma-Devs/smart-router' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     ghcr.io/magma-devs/smart-router:<tag>
# Same OIDC/Fulcio keyless flow as the checksum signing below — no key to
# manage. `output: true` streams the transparency-log entry to the build log.
docker_signs:
  - id: cosign-image-sbom
    cmd: scripts/attest-image-sbom.sh
    artifacts: images
    output: true
    args:
      - "${artifact}"

# No `changelog:` block. The release workflow passes
# `--release-notes .release-notes/body.md` to goreleaser, which:
#   1. Uses that file as the entire release body, AND
#   2. Skips goreleaser's own changelog generation (per the flag's docs).
#
# We previously had `changelog: { disable: true }` here, but combining
# it with `--release-notes` caused goreleaser to silently ship a release
# with an empty body — the file content was never loaded. Dropping
# `disable: true` and trusting the flag's own skip-changelog behavior
# fixes that.
#
# The conventional-commit grouping logic that used to live here is now
# in scripts/changelog-bump.sh — see docs/RELEASING.md.

# Cosign keyless signing of the checksum file. Requires `id-token: write`
# in the release workflow and cosign installed on the runner (added by
# sigstore/cosign-installer in .github/workflows/release.yml). The OIDC
# token from GitHub Actions is exchanged with Sigstore Fulcio for a
# short-lived signing certificate — no private key to manage or rotate.
# Verification recipe is in docs/RELEASING.md.
signs:
  - id: cosign-checksums
    cmd: cosign
    artifacts: checksum
    output: true
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
      - '--yes'

release:
  github:
    owner: magma-Devs
    name: smart-router
  replace_existing_draft: true
  # Just the tag (e.g. `v1.0.0`) — no project-name prefix.
  name_template: "{{.Tag}}"
  mode: replace
  draft: true
  # Every release is born a PRERELEASE, regardless of tag shape. The flow
  # is two-stage: tag push publishes a draft prerelease (per-version Docker
  # image only, no :latest); a human then graduates it on GitHub by flipping
  # the "Latest" label (prerelease → full release). That graduation fires the
  # GitHub `released` event, which .github/workflows/graduate-latest.yml uses
  # to move the Docker :latest tag onto the graduated version. So neither this
  # build nor the tag string ever decides :latest — graduation does.
  prerelease: true
  # The release body is the matching `## <tag>` section of CHANGELOG.md.
  # The release workflow extracts it with scripts/extract-changelog.sh
  # and passes the result to goreleaser via `--release-notes`. Combined
  # with `changelog.disable: true` above, that file becomes the entire
  # release body — no goreleaser-generated content appended.
