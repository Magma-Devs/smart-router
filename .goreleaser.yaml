version: 2
project_name: smart-router

before:
  hooks:
    - go mod tidy

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

env:
  - CGO_ENABLED=0
  - GOAMD64=v3
  - GOARM64=v8.2

builds:
  - id: smartrouter
    binary: smartrouter
    dir: cmd/smartrouter
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: s390x
      - goos: darwin
        goarch: ppc64le
    flags:
      - -mod=readonly
      - -trimpath
    ldflags:
      - -w
      - -s
      - -X github.com/magma-Devs/smart-router/version.Version={{ .Tag }}
      - -X github.com/magma-Devs/smart-router/version.Commit={{ .FullCommit }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: smartrouter
    builds:
      - smartrouter
    formats:
      - binary
    name_template: '{{ .Binary }}-v{{ .Version }}-{{ .Os }}-{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}-{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}'

dockers:
  - id: smartrouter-linux-amd64
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/magma-devs/smart-router:{{ .Tag }}-amd64"
      - "{{ if not .Prerelease }}ghcr.io/magma-devs/smart-router:latest-amd64{{ end }}"
    dockerfile: Dockerfile.release
    use: buildx
    # build_flag_templates is shared with arm64 below via a YAML anchor;
    # --platform uses goreleaser's .Arch template so the same flag set
    # works for both architectures.
    build_flag_templates: &docker_build_flags
      - "--platform=linux/{{ .Arch }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.source={{ .GitURL }}"

  - id: smartrouter-linux-arm64
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/magma-devs/smart-router:{{ .Tag }}-arm64"
      - "{{ if not .Prerelease }}ghcr.io/magma-devs/smart-router:latest-arm64{{ end }}"
    dockerfile: Dockerfile.release
    use: buildx
    build_flag_templates: *docker_build_flags

docker_manifests:
  - name_template: "ghcr.io/magma-devs/smart-router:{{ .Tag }}"
    image_templates:
      - "ghcr.io/magma-devs/smart-router:{{ .Tag }}-amd64"
      - "ghcr.io/magma-devs/smart-router:{{ .Tag }}-arm64"
  # :latest manifest is only published for non-prerelease tags so RC /
  # alpha / beta releases don't overwrite the stable :latest pointer.
  # Requires `release: prerelease: auto` (or explicit .Prerelease=false)
  # — see comment in the release: block.
  - name_template: "{{ if not .Prerelease }}ghcr.io/magma-devs/smart-router:latest{{ end }}"
    image_templates:
      - "ghcr.io/magma-devs/smart-router:latest-amd64"
      - "ghcr.io/magma-devs/smart-router:latest-arm64"

checksum:
  name_template: "sha256sum.txt"
  algorithm: sha256

changelog:
  use:
    github
  sort: asc
  groups:
    - title: Dependency updates
      regexp: '^.*?(feat|fix|chore)\(deps\)!?:.+$'
      order: 300
    - title: "New Features"
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 100
    - title: "Security updates"
      regexp: '^.*?sec(\(.+\))??!?:.+$'
      order: 150
    - title: "Bug fixes"
      regexp: '^.*?(fix|refactor)(\(.+\))??!?:.+$'
      order: 200
    - title: "Documentation updates"
      regexp: ^.*?docs?(\(.+\))??!?:.+$
      order: 400
    - title: "Build process updates"
      regexp: ^.*?(build|ci)(\(.+\))??!?:.+$
      order: 400
    - title: Other work
      order: 9999
  filters:
    exclude:
      - "^test:"
      - "^test\\("
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy

release:
  github:
    owner: magma-Devs
    name: smart-router
  replace_existing_draft: true
  name_template: "Smart Router v{{.Version}}"
  mode: replace
  draft: true
  # `auto` derives prerelease from the tag: vX.Y.Z is a final, vX.Y.Z-*
  # (e.g. v1.0.0-rc1, v1.0.0-beta.2) is a prerelease. The :latest Docker
  # tag in dockers / docker_manifests is guarded on `not .Prerelease`, so
  # RC and beta tags don't overwrite the stable :latest pointer.
  prerelease: auto
