# Sample router topology the dashboard backend reads for its component view.
# Mounted read-only into the backend container at /app/helm-values.
#
# This describes the upstreams the default router config
# (config/smartrouter_examples/smartrouter_eth.yml) routes to. If you launch a
# different SR_CONFIG, update this to match so the dashboard's component panel
# reflects the running topology. Live metrics come from Prometheus regardless —
# this file only drives the static component listing.

routers:
  - id: Ethereum
    network: eth1
    nodes:
      - name: eth-lava-build
        endpoints:
          - url: https://eth1.lava.build
            interface: jsonrpc
            addons: []
      - name: eth-publicnode
        endpoints:
          - url: https://ethereum-rpc.publicnode.com
            interface: jsonrpc
            addons: []
      - name: eth-tenderly
        endpoints:
          - url: https://mainnet.gateway.tenderly.co
            interface: jsonrpc
            addons: []
