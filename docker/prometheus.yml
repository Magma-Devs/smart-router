# Prometheus scrape config for the local dashboard stack.
#
# Scrapes the smart-router's metrics endpoint (metrics-listen-address in the
# router config, default 0.0.0.0:7779). The dashboard backend then runs PromQL
# against this Prometheus (smartrouter_* series) to build its panels.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: smart-router
    metrics_path: /metrics
    static_configs:
      # `router` is the service name from docker/docker-compose.yml; 7779 is the
      # router's metrics-listen-address. Both compose files share the
      # `smart-router` project network so this DNS name resolves.
      - targets: ["router:7779"]
