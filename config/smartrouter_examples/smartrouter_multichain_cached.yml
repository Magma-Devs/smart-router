# Smart Router Direct RPC Configuration — multi-chain (ETH + Solana + Cosmos) WITH cache
# Mode: Direct connections to public RPC endpoints (no Lava providers!)
#
# Same shape as smartrouter_multichain.yml, but trimmed to three chains and with
# the external cache-be address baked into the config (cache-be: below). Run it
# with the cache overlay:
#   SR_CONFIG=config/smartrouter_examples/smartrouter_multichain_cached.yml \
#     docker compose -f docker/docker-compose.yml \
#                    -f docker/docker-compose.cache.yml up --build
#
# Three chains on three ports, each with 2 distinct public vendor groups:
#   3360  ETH1       jsonrpc   ethereum-rpc.publicnode.com + mainnet.gateway.tenderly.co
#   3361  SOLANA     jsonrpc   solana-rpc.publicnode.com   + api.mainnet-beta.solana.com
#   3362  COSMOSHUB  rest      cosmos-rest.publicnode.com  + cosmos-api.polkachu.com
#
# ETH1 requires websocket support, so its providers pair an http url with a wss
# url; http-only providers are excluded at startup. SOLANA (jsonrpc) and
# COSMOSHUB (rest) are HTTP-only here, so run with --skip-websocket-verification
# (the docker-compose example does this).
#
# Specs required (resolve via --use-static-spec specs/):
#   ETH1      -> specs/ethereum.json   (already in repo)
#   SOLANA    -> specs/solana.json     (already in repo)
#   COSMOSHUB -> specs/cosmoshub.json  (imports COSMOSSDK50 + COSMOSWASM)  — from Magma-Devs/lava-specs

# External cache-be server (the `smart-router cache` sidecar). "cache:20100"
# is the compose service name + port. Remove this key (or run without the
# cache service) to disable caching.
cache-be: "cache:20100"

# Prometheus metrics (scrape at http://<host>:7779/metrics). Set to
# "disabled" to turn off.
metrics-listen-address: "0.0.0.0:7779"

endpoints:
  - listen-address: "0.0.0.0:3360"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3360"

  - listen-address: "0.0.0.0:3361"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3361"

  - listen-address: "0.0.0.0:3362"
    chain-id: "COSMOSHUB"
    api-interface: "rest"
    network-address: "0.0.0.0:3362"

direct-rpc:
  # ---- Ethereum (ETH1, chainId 0x1) ----
  - name: "eth-publicnode"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://ethereum-rpc.publicnode.com"
      - url: "wss://ethereum-rpc.publicnode.com"

  - name: "eth-tenderly"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://mainnet.gateway.tenderly.co"
      - url: "wss://mainnet.gateway.tenderly.co"

  # ---- Solana (SOLANA) — HTTP-only ----
  - name: "sol-publicnode"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://solana-rpc.publicnode.com"
        # PublicNode's free tier blocks getProgramAccounts (the spec's
        # tokens-owner-indexed verification), so skip that startup check here.
        skip-verifications:
          - tokens-owner-indexed

  - name: "sol-solana-labs"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://api.mainnet-beta.solana.com"

  # ---- Cosmos Hub (COSMOSHUB) — REST; HTTP-only ----
  - name: "cosmos-rest-publicnode"
    chain-id: "COSMOSHUB"
    api-interface: "rest"
    node-urls:
      - url: "https://cosmos-rest.publicnode.com"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "cosmos-rest-polkachu"
    chain-id: "COSMOSHUB"
    api-interface: "rest"
    node-urls:
      - url: "https://cosmos-api.polkachu.com"
        timeout: 10s
        skip-verifications:
          - pruning
