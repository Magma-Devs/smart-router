# Smart Router Direct RPC Configuration — Ethereum WITH cache
# Mode: Direct connections to Ethereum JSON-RPC endpoints (no Lava providers!)
#
# Same as smartrouter_eth.yml, but with the external cache-be address baked
# into the config (cache-be: below). Demonstrates config-file-driven caching —
# the address is read via viper, so it works from the YAML as well as the
# --cache-be flag (the flag wins on conflict).
#
# Run it with the cache overlay (which starts the cache service):
#   SR_CONFIG=config/smartrouter_examples/smartrouter_eth_cached.yml \
#     docker compose -f docker/docker-compose.yml \
#                    -f docker/docker-compose.cache.yml up --build
#
# 3 upstreams, each HTTP + WebSocket (the ETH1 spec requires ws for
# subscriptions; http-only providers are excluded at startup):
#   1. Lava public gateway (eth1.lava.build, ws at /websocket)
#   2. PublicNode
#   3. Tenderly public gateway

# External cache-be server (the `smart-router cache` sidecar). "cache:20100"
# is the compose service name + port. Remove this key (or run without the
# cache service) to disable caching.
cache-be: "cache:20100"

# Prometheus metrics (scrape at http://<host>:7779/metrics). Set to
# "disabled" to turn off.
metrics-listen-address: "0.0.0.0:7779"

endpoints:
  - listen-address: "0.0.0.0:3360"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3360"

direct-rpc:
  # Endpoint 1 — Lava public gateway (HTTP + WS)
  - name: "eth-lava-build"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://eth1.lava.build"
      - url: "wss://eth1.lava.build/websocket"

  # Endpoint 2 — PublicNode (HTTP + WS)
  - name: "eth-publicnode"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://ethereum-rpc.publicnode.com"
      - url: "wss://ethereum-rpc.publicnode.com"

  # Endpoint 3 — Tenderly public gateway (HTTP + WS)
  - name: "eth-tenderly"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://mainnet.gateway.tenderly.co"
      - url: "wss://mainnet.gateway.tenderly.co"
