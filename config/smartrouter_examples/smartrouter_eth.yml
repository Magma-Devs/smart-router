    chain-id: "ETH1"
    api-interface: "websocket"
    node-urls:
      - url: "wss://g.w.lavanet.xyz:443/gateway/eth/rpc/4926f3fd246058892909cdda0c88f8c7"

  # WebSocket Endpoint 3 (Phase 5 - Subscriptions)
  - name: "eth-ws-3"
    chain-id: "ETH1"
    api-interface: "websocket"
    node-urls:
      - url: "wss://ethereum-rpc.publicnode.com"

