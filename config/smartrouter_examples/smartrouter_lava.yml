# Smart Router Direct RPC Configuration (LAVA — 3 sources per interface)
# Mode: Direct connections to public LAVA endpoints (no Lava providers!)
#
# Each of the three LAVA interfaces (rest, grpc, tendermintrpc) is backed by
# three DISTINCT upstream sources so cross-validation / group-diversity
# policies have something real to span:
#   1. Lava public gateway   (*.lava.build)        group-label: lava
#   2. PublicNode            (*.publicnode.com)     group-label: publicnode
#   3. F5 Nodes              (*.f5nodes.com)         group-label: f5nodes
#
# NOTE: Tenderly is EVM-only and does not serve the LAVA (Cosmos) chain, so
# F5 Nodes stands in as the third independent source here. Public community
# endpoints are rate-limited and best-effort — swap in your own nodes or a
# Lavanet g.w gateway key (grpcs://<key>-lava.g.w.lavanet.xyz:443) for prod.

endpoints:
  - network-address: "0.0.0.0:3360"
    chain-id: "LAVA"
    api-interface: "rest"

  - network-address: "0.0.0.0:3361"
    chain-id: "LAVA"
    api-interface: "grpc"

  - network-address: "0.0.0.0:3362"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"

direct-rpc:
  # group-label tags the provider's vendor/operator group so cross-validation
  # group-diversity policies can require a quorum to span N distinct groups.

  # ---- REST — 3 sources ----
  - name: "lava-rest-lava"
    group-label: "lava"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava.rest.lava.build"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "lava-rest-publicnode"
    group-label: "publicnode"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-rest.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "lava-rest-f5nodes"
    group-label: "f5nodes"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-api.f5nodes.com"
        timeout: 10s
        skip-verifications:
          - pruning

  # ---- gRPC — 3 sources ----
  # grpcs:// implies TLS (:443). The F5 endpoint is a plaintext gRPC port, so
  # it uses grpc:// without auth-config.use-tls.
  - name: "lava-grpc-lava"
    group-label: "lava"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://lava.grpc.lava.build:443"
        auth-config:
          use-tls: true
        skip-verifications:
          - pruning
          - tx-indexing

  - name: "lava-grpc-publicnode"
    group-label: "publicnode"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://lava-grpc.publicnode.com:443"
        auth-config:
          use-tls: true
        skip-verifications:
          - pruning
          - tx-indexing

  - name: "lava-grpc-f5nodes"
    group-label: "f5nodes"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpc://lava-grpc.f5nodes.com:9290"
        skip-verifications:
          - pruning
          - tx-indexing

  # ---- TendermintRPC — 3 sources (HTTP + WS where the provider serves it) ----
  - name: "lava-tendermintrpc-lava"
    group-label: "lava"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava.tendermintrpc.lava.build"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava.tendermintrpc.lava.build/websocket"
        skip-verifications:
          - pruning

  - name: "lava-tendermintrpc-publicnode"
    group-label: "publicnode"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning

  - name: "lava-tendermintrpc-f5nodes"
    group-label: "f5nodes"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.f5nodes.com"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.f5nodes.com/websocket"
        skip-verifications:
          - pruning