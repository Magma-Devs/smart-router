# Smart Router Direct RPC Configuration (Lava via PublicNode)
# Mode: Direct connections to PublicNode endpoints (no Lava providers!)
#
# This file is generated by: scripts/pre_setups/init_lava_smartrouter_lava.sh

endpoints:
  - network-address: "0.0.0.0:3360"
    chain-id: "LAVA"
    api-interface: "rest"

  - network-address: "0.0.0.0:3361"
    chain-id: "LAVA"
    api-interface: "grpc"

  - network-address: "0.0.0.0:3362"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"

  - network-address: "0.0.0.0:3363"
    chain-id: "ETH1"
    api-interface: "jsonrpc"

direct-rpc:
  # 3 upstream REST endpoints (PublicNode TLS)
  - name: "lava-publicnode-rest-1"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-rest.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "lava-publicnode-rest-2"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-rest.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "lava-publicnode-rest-3"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-rest.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning

  # 3 upstream gRPC endpoints (PublicNode TLS)
  # Note: gRPC URLs must NOT include a scheme prefix (grpcs:// is invalid).
  # TLS is enabled via auth-config.use-tls below.
  # Note: PublicNode gRPC blocks GetNodeInfo (used by chain-id verification),
  # so chain-id must be skipped for gRPC. REST/TendermintRPC still verify it.
  - name: "lava-publicnode-grpc-1"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://lava-grpc.publicnode.com:443"
        auth-config:
          use-tls: true
        skip-verifications:
          - chain-id
          - pruning
          - tx-indexing

  - name: "lava-publicnode-grpc-2"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://lava-grpc.publicnode.com:443"
        auth-config:
          use-tls: true
        skip-verifications:
          - chain-id
          - pruning
          - tx-indexing

  - name: "lava-publicnode-grpc-3"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://lava-grpc.publicnode.com:443"
        auth-config:
          use-tls: true
        skip-verifications:
          - chain-id
          - pruning
          - tx-indexing

  # 3 upstream Tendermint RPC endpoints (PublicNode TLS)
  - name: "lava-publicnode-tendermintrpc-1"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning

  - name: "lava-publicnode-tendermintrpc-2"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning

  - name: "lava-publicnode-tendermintrpc-3"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning

  # 3 upstream Ethereum JSON-RPC endpoints.
  # Each provider must include a wss:// URL alongside the https:// URL so the
  # router can serve eth_subscribe (websocket is a required addon for ETH1).
  - name: "eth-rpc-1"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://eth.llamarpc.com"
        skip-verifications:
          - chain-id
          - pruning
      - url: "wss://ethereum-rpc.publicnode.com"
        skip-verifications:
          - chain-id
          - pruning

  - name: "eth-rpc-2"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://ethereum-rpc.publicnode.com"
        skip-verifications:
          - chain-id
          - pruning
      - url: "wss://ethereum-rpc.publicnode.com"
        skip-verifications:
          - chain-id
          - pruning

  - name: "eth-rpc-3"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://rpc.ankr.com/eth"
        skip-verifications:
          - chain-id
          - pruning
      - url: "wss://ethereum-rpc.publicnode.com"
        skip-verifications:
          - chain-id
          - pruning

