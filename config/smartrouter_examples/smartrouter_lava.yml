# Smart Router Direct RPC Configuration (Lava via PublicNode)
# Mode: Direct connections to PublicNode endpoints (no Lava providers!)
#
# This file is generated by: scripts/pre_setups/init_lava_smartrouter_lava.sh

endpoints:
  - network-address: "0.0.0.0:3360"
    chain-id: "LAVA"
    api-interface: "rest"

  - network-address: "0.0.0.0:3361"
    chain-id: "LAVA"
    api-interface: "grpc"

  - network-address: "0.0.0.0:3362"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"

direct-rpc:
  # 3 upstream REST endpoints (PublicNode TLS)
  - name: "lava-publicnode-rest-1"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-rest.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "lava-publicnode-rest-2"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-rest.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "lava-publicnode-rest-3"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-rest.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning

  # 1 upstream gRPC endpoint (Lavanet gateway, TLS)
  # Note: grpcs:// scheme is required and implies TLS; auth-config.use-tls
  # below is redundant but kept explicit. chain-id verification is enabled.
  - name: "lava-publicnode-grpc-1"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://ba054036cd701b601cdab0806f7ad1da-lava.g.w.lavanet.xyz:443"
        auth-config:
          use-tls: true
        skip-verifications:
          - pruning
          - tx-indexing

  # 3 upstream Tendermint RPC endpoints (PublicNode TLS)
  - name: "lava-publicnode-tendermintrpc-1"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning

  - name: "lava-publicnode-tendermintrpc-2"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning

  - name: "lava-publicnode-tendermintrpc-3"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning