# Smart Router Direct RPC Configuration — multi-chain + CROSS-VALIDATION
# Mode: Direct connections to public endpoints (no Lava providers!)
#
# Same upstream layout as smartrouter_multichain.yml — every bundled chain on
# its own port, with TWO distinct sources per chain<>interface (the Lava public
# gateway, group-label: lava; and PublicNode, group-label: publicnode) — but
# this variant ALSO enables per-method cross-validation so reads are corroborated
# across both vendor groups before being returned.
#
#   3360  ETH1     jsonrpc        eth1.lava.build       + ethereum-rpc.publicnode.com
#   3361  ARBITRUM jsonrpc        arbitrum.lava.build   + arbitrum-one-rpc.publicnode.com
#   3362  BASE     jsonrpc        base.lava.build       + base-rpc.publicnode.com
#   3363  SOLANA   jsonrpc        solana.lava.build     + solana-rpc.publicnode.com
#   3364  LAVA     rest           lava.rest.lava.build  + lava-rest.publicnode.com
#   3365  LAVA     tendermintrpc  lava.tendermintrpc…   + lava-rpc.publicnode.com
#   3366  LAVA     grpc           lava.grpc.lava.build  + lava-grpc.publicnode.com
#
# The EVM chains (ETH1/ARBITRUM/BASE, which import ETH1) require a ws:// leg, so
# each pairs an https url with a wss one. SOLANA is HTTP-only here, so start the
# router with --skip-websocket-verification (the docker-compose example does this).
#
# Specs resolve from the bundled specs/ (pass --use-static-spec specs/): ETH1,
# ARBITRUM (imports ETH1), BASE (imports ETH1), SOLANA, and LAVA (imports
# COSMOSSDK, which imports IBC + TENDERMINT) — all present in the repo.

# Prometheus metrics (scrape at http://<host>:7779/metrics). Set to
# "disabled" to turn off. Read via viper, so the --metrics-listen-address
# flag overrides this if both are set.
metrics-listen-address: "0.0.0.0:7779"

endpoints:
  - listen-address: "0.0.0.0:3360"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3360"

  - listen-address: "0.0.0.0:3361"
    chain-id: "ARBITRUM"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3361"

  - listen-address: "0.0.0.0:3362"
    chain-id: "BASE"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3362"

  - listen-address: "0.0.0.0:3363"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3363"

  - listen-address: "0.0.0.0:3364"
    chain-id: "LAVA"
    api-interface: "rest"
    network-address: "0.0.0.0:3364"

  - listen-address: "0.0.0.0:3365"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    network-address: "0.0.0.0:3365"

  - listen-address: "0.0.0.0:3366"
    chain-id: "LAVA"
    api-interface: "grpc"
    network-address: "0.0.0.0:3366"

direct-rpc:
  # Two distinct sources per chain<>interface: the Lava public gateway
  # (group-label: lava) and PublicNode (group-label: publicnode). The
  # cross-validation block below requires both groups to corroborate reads.

  # ---- Ethereum (ETH1, chainId 0x1) ----
  - name: "eth-lava"
    group-label: "lava"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://eth1.lava.build"
      - url: "wss://eth1.lava.build/websocket"

  - name: "eth-publicnode"
    group-label: "publicnode"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://ethereum-rpc.publicnode.com"
      - url: "wss://ethereum-rpc.publicnode.com"

  # ---- Arbitrum One (ARBITRUM, chainId 0xa4b1) ----
  - name: "arb-lava"
    group-label: "lava"
    chain-id: "ARBITRUM"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://arbitrum.lava.build"
      - url: "wss://arbitrum.lava.build/websocket"

  - name: "arb-publicnode"
    group-label: "publicnode"
    chain-id: "ARBITRUM"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://arbitrum-one-rpc.publicnode.com"
      - url: "wss://arbitrum-one-rpc.publicnode.com"

  # ---- Base (BASE, chainId 0x2105) ----
  - name: "base-lava"
    group-label: "lava"
    chain-id: "BASE"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://base.lava.build"
      - url: "wss://base.lava.build/websocket"

  - name: "base-publicnode"
    group-label: "publicnode"
    chain-id: "BASE"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://base-rpc.publicnode.com"
      - url: "wss://base-rpc.publicnode.com"

  # ---- Solana (SOLANA) — HTTP-only; run with --skip-websocket-verification ----
  - name: "sol-lava"
    group-label: "lava"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://solana.lava.build"

  - name: "sol-publicnode"
    group-label: "publicnode"
    chain-id: "SOLANA"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://solana-rpc.publicnode.com"

  # ---- Lava (LAVA) — REST + Tendermint RPC + gRPC, two sources each ----
  - name: "lava-rest-lava"
    group-label: "lava"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava.rest.lava.build"
        timeout: 10s

  - name: "lava-rest-publicnode"
    group-label: "publicnode"
    chain-id: "LAVA"
    api-interface: "rest"
    node-urls:
      - url: "https://lava-rest.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning

  - name: "lava-tendermintrpc-lava"
    group-label: "lava"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava.tendermintrpc.lava.build"
        timeout: 10s
      - url: "wss://lava.tendermintrpc.lava.build/websocket"

  - name: "lava-tendermintrpc-publicnode"
    group-label: "publicnode"
    chain-id: "LAVA"
    api-interface: "tendermintrpc"
    node-urls:
      - url: "https://lava-rpc.publicnode.com:443"
        timeout: 10s
        skip-verifications:
          - pruning
      - url: "wss://lava-rpc.publicnode.com:443/websocket"
        skip-verifications:
          - pruning

  - name: "lava-grpc-lava"
    group-label: "lava"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://lava.grpc.lava.build:443"
        auth-config:
          use-tls: true

  - name: "lava-grpc-publicnode"
    group-label: "publicnode"
    chain-id: "LAVA"
    api-interface: "grpc"
    node-urls:
      - url: "grpcs://lava-grpc.publicnode.com:443"
        auth-config:
          use-tls: true
        skip-verifications:
          - pruning
          - tx-indexing

# Per-method cross-validation. Each knob resolves as clamp(caller, floor, cap):
# floor = operator minimum the caller may exceed, cap = operator maximum that
# overrides a stricter caller. A bare number N means {floor: N}. chain-id/
# api-interface match case-insensitively; method exactly. Policies on stateful
# (write) methods are rejected at startup.
#
# With exactly two group-labels per chain<>interface (lava + publicnode), the
# meaningful diversity bar is min-groups: 2 — both vendors must corroborate.
cross-validation:
  policies:
    # ETH1 — balance reads corroborated by both vendors before returning.
    - chain-id: ETH1
      api-interface: jsonrpc
      method: eth_getBalance
      enabled: true
      agreement-threshold: 2          # both sources must return identical responses
      max-participants: 2             # fan out to both
      min-groups: 2                   # spanning both distinct group-labels (lava + publicnode)

    # ETH1 — receipts must be unanimous across both groups.
    - chain-id: ETH1
      api-interface: jsonrpc
      method: eth_getTransactionReceipt
      enabled: true
      agreement-threshold: 2
      max-participants: 2
      min-groups: 2

    # BASE — same balance corroboration on the Base port.
    - chain-id: BASE
      api-interface: jsonrpc
      method: eth_getBalance
      enabled: true
      agreement-threshold: 2
      max-participants: 2
      min-groups: 2

    # LAVA REST — corroborate a bank balance query across both vendors.
    - chain-id: LAVA
      api-interface: rest
      method: cosmos.bank.v1beta1.Query/Balance
      enabled: true
      agreement-threshold: 2
      max-participants: 2
      min-groups: 2
