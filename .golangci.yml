version: "2"

run:
  tests: true
  timeout: 7m

linters:
  default: none
  # For list of linters and what they do: https://golangci-lint.run/usage/linters/
  enable:
    - copyloopvar
    - dogsled
    - forcetypeassert
    - gocritic
    - govet
    - importas
    - ineffassign
    - misspell
    - nakedret
    - nilnil
    - nolintlint
    # staticcheck now also runs the former `stylecheck` (ST*) checks — golangci-lint v2.4+ merged
    # stylecheck into staticcheck, so listing `stylecheck` separately is an "unknown linter" error.
    - staticcheck
    - unconvert
    - whitespace
  settings:
    dogsled:
      max-blank-identifiers: 5
    gocritic:
      disabled-checks:
        - elseif
    nolintlint:
      allow-unused: false
      require-explanation: false
      require-specific: false
  exclusions:
    paths:
      - protocol/chainlib/chainproxy/rpcInterfaceMessages/grpcMessage.go
      - protocol/chainlib/grpc.go
      - protocol/chainlib/grpcproxy/dyncodec/remote_grpc_reflection.go
      - protocol/chainlib/grpcproxy/dyncodec/remote_relayer.go
      - protocol/chainlib/grpcproxy/dyncodec/remotes_test.go
    rules:
      - linters:
          - gocritic
        text: "singleCaseSwitch"
      - linters:
          - gocritic
        text: "ifElseChain"
      # ST1003 / ST1016 are now emitted by staticcheck (stylecheck was merged in). Keep them excluded to
      # preserve the prior intent. https://github.com/dominikh/go-tools/issues/389
      - linters:
          - staticcheck
        text: "ST1003:"
      - linters:
          - staticcheck
        text: "ST1016:"
      # golangci-lint v2 folded stylecheck into staticcheck and additionally turns on the QF* "quickfix"
      # category by default. The prior config (separate stylecheck) never ran QF*, so exclude it to keep
      # this a like-for-like migration rather than expanding the lint surface with style-only refactors.
      - linters:
          - staticcheck
        text: "QF\\d+:"
      - linters:
          - staticcheck
        text: 'SA1019:.*"github.com/golang/protobuf/proto" is deprecated.*'
      # gRPC bumped grpc.DialContext / grpc.Dial / grpc.WithBlock /
      # grpc.WithReturnConnectionError to deprecated in v1.63 in favor of
      # grpc.NewClient. Migration is non-trivial (NewClient is lazy, no
      # context, no WithBlock semantics). The 1.x branch will keep
      # supporting the old API "throughout 1.x" per upstream — exclude
      # until a dedicated migration PR.
      - linters:
          - staticcheck
        text: 'SA1019:.*grpc\.(DialContext|Dial|WithBlock|WithReturnConnectionError) is deprecated.*'
      - path: migrations
        linters:
          - staticcheck
        text: "SA1019:"

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 10000
  max-same-issues: 10000
