name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest
        timeout-minutes: 10

      - name: Run tests
        timeout-minutes: 20
        run: |
          set -o pipefail
          go test -json -timeout 15m -coverprofile=coverage.out ./... \
            | tee test.json \
            | grep -v '"Action":"output"' \
            | go-junit-report -parser gojson -set-exit-code -out test-report.xml
          jq -r 'select(.Action=="output") | .Output' test.json > test.log || true

      - name: Print failed test output
        if: failure()
        run: |
          echo "=== Failed test output ==="
          jq -r 'select(.Action=="output") | .Output' test.json 2>/dev/null | tail -200 || echo "No test output found"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-report.xml
            test.log
            test.json
            coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Magma-Devs/smart-router
          files: ./coverage.out
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build smartrouter (${{ matrix.targetos }}-${{ matrix.arch }})
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        targetos: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
        env:
          GOOS: ${{ matrix.targetos }}
          GOARCH: ${{ matrix.arch }}

      - name: Download dependencies
        run: go mod download

      - name: Build smartrouter
        env:
          GOOS: ${{ matrix.targetos }}
          GOARCH: ${{ matrix.arch }}
        run: |
          GOWORK=off go build -mod=readonly -o out/smartrouter ./cmd/smartrouter

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartrouter-${{ matrix.targetos }}-${{ matrix.arch }}
          path: out/smartrouter

  build_docker:
    name: Build Docker image
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            GIT_VERSION=pr-${{ github.event.pull_request.number || github.sha }}
            GIT_COMMIT=${{ github.sha }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  report-test-results:
    name: Publish test results
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          files: "artifacts/**/*.xml"
