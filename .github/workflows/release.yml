name: Publish Smart Router Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "The desired tag for the release (e.g. v1.1.0)."
        required: true

permissions:
  contents: read

jobs:
  # Sprint 5 review — pre-publish verification gate.
  #
  # Both `release` and `release_docker` depend on this job. It reproduces the
  # same checks the PR-time `Build and Test` workflow runs, but on the tagged
  # commit that goreleaser is about to ship. Catches: an enterprise-only
  # symbol leaking into the community binary, a forbidden constructor call,
  # a goreleaser config that drifted out of sync.
  #
  # No matrix — `make test-both`, `make verify-binaries`, and goreleaser
  # check each handle both editions internally.
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tests (community + enterprise)
        run: make test-both

      - name: Source-level edition gate guard
        run: make check-gates

      - name: Post-build symbol/string/size/dep verification
        run: make verify-binaries

      - name: GoReleaser config validation
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: check

  release:
    name: release
    needs: [verify]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
      with:
        large-packages: false
        docker-images: false
        swap-storage: false
        tool-cache: false

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}

    - name: Fetch all tags
      run: |
        git fetch --force --tags

    - name: Run GoReleaser
      id: releaser
      uses: docker://goreleaser/goreleaser-cross:v1.22
      with:
        args: release --clean --timeout 90m
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_docker:
    needs: [verify]
    permissions:
      # GitHub Actions REPLACES (does not merge) workflow-level permissions
      # with job-level permissions. Restating contents:read here is required —
      # without it, actions/checkout below has no access to the repo.
      contents: read
      packages: write
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: "Magma-Devs/smart-router"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_VERSION="${{ steps.meta.outputs.version }}"
            GIT_COMMIT="${{ github.sha }}"
          push: true
