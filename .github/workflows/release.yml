name: Publish Smart Router Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "The desired tag for the release (e.g. v1.1.0)."
        required: true

permissions:
  contents: read

jobs:
  release:
    name: release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
      with:
        large-packages: false
        docker-images: false
        swap-storage: false
        tool-cache: false

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}

    - name: Fetch all tags
      run: |
        git fetch --force --tags

    - name: Run GoReleaser
      id: releaser
      uses: docker://goreleaser/goreleaser-cross:v1.22
      with:
        args: release --clean --timeout 90m
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_docker_binaries:
    name: Build smart-router binary (linux/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: ${{ matrix.arch }}
      GOAMD64: v3
      GOARM64: v8.2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Resolve version
        id: ver
        env:
          REF: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
        run: echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Download dependencies
        run: go mod download

      - name: Build smartrouter
        run: |
          GOWORK=off go build \
            -mod=readonly \
            -trimpath \
            -ldflags "-X main.version=${{ steps.ver.outputs.version }} -X main.commit=${{ github.sha }} -w -s" \
            -o out/smartrouter ./cmd/smartrouter

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartrouter-linux-${{ matrix.arch }}
          path: out/smartrouter

  release_docker:
    needs: [build_docker_binaries]
    permissions:
      packages: write
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: "magma-Devs/smart-router"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: smartrouter-linux-amd64
          path: artifacts/linux/amd64

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: smartrouter-linux-arm64
          path: artifacts/linux/arm64

      - name: Make binaries executable
        run: chmod +x artifacts/linux/amd64/smartrouter artifacts/linux/arm64/smartrouter

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
