name: PR Gate - Dev Sim Preflight

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-dev-sim-prtests
  cancel-in-progress: false

jobs:
  build:
    name: Build PR artifact
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: amd64
      GOAMD64: v3
    steps:
      - name: Fetch PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          pr_json=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")
          head_sha=$(jq -r '.head.sha' <<< "$pr_json")
          head_repo=$(jq -r '.head.repo.full_name' <<< "$pr_json")
          if [ -z "$head_sha" ] || [ "$head_sha" = "null" ]; then
            echo "::error::Could not resolve head SHA for PR #${PR_NUMBER}"
            exit 1
          fi
          if [ -z "$head_repo" ] || [ "$head_repo" = "null" ]; then
            echo "::error::Could not resolve head repository for PR #${PR_NUMBER}"
            exit 1
          fi
          if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
            echo "::error::PR head repo must be ${GITHUB_REPOSITORY}, got ${head_repo}"
            exit 1
          fi
          short_sha="${head_sha:0:7}"
          artifact_name="smartrouter-pr-${PR_NUMBER}-${short_sha}-linux-amd64"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "head_repo=$head_repo" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #${PR_NUMBER} head SHA: ${head_sha}"

      - uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Resolve version from git
        id: ver
        run: |
          set -euo pipefail
          v=$(git describe --tags --always --dirty)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build smartrouter
        run: |
          mkdir -p out
          GOWORK=off go build \
            -mod=readonly \
            -trimpath \
            -ldflags "-X github.com/magma-Devs/smart-router/version.Version=${{ steps.ver.outputs.version }} -X github.com/magma-Devs/smart-router/version.Commit=${{ steps.pr.outputs.head_sha }} -w -s" \
            -o out/smartrouter ./cmd/smartrouter

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.pr.outputs.artifact_name }}
          path: out/smartrouter

      - name: Write summary
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          SHORT_SHA: ${{ steps.pr.outputs.short_sha }}
          VERSION: ${{ steps.ver.outputs.version }}
          ARTIFACT_NAME: ${{ steps.pr.outputs.artifact_name }}
        run: |
          {
            echo "### PR Gate artifact build"
            echo ""
            echo "- PR number: \`${PR_NUMBER}\`"
            echo "- PR head SHA: \`${HEAD_SHA}\`"
            echo "- Short SHA: \`${SHORT_SHA}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Artifact name: \`${ARTIFACT_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight dev-sim-prtests
        env:
          SSH_HOST: ${{ secrets.DEV_SIM_PRTESTS_SSH_HOST }}
          SSH_KEY: ${{ secrets.DEV_SIM_PRTESTS_SSH_KEY }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          ARTIFACT_NAME: ${{ steps.pr.outputs.artifact_name }}
        run: |
          set -euo pipefail
          preflight_result="failed"

          write_summary() {
            ssh_target="missing"
            if [ -n "${SSH_HOST:-}" ]; then
              ssh_target="configured"
            fi
            {
              echo "### dev-sim-prtests preflight"
              echo ""
              echo "- Target environment: \`dev-sim-prtests\`"
              echo "- SSH target: \`${ssh_target}\`"
              echo "- Artifact name: \`${ARTIFACT_NAME}\`"
              echo "- PR number: \`${PR_NUMBER}\`"
              echo "- PR head SHA: \`${HEAD_SHA}\`"
              echo "- Preflight result: \`${preflight_result}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          redact_remote_output() {
            SSH_HOST_VALUE="$SSH_HOST" perl -0pe '
              BEGIN {
                $target = $ENV{"SSH_HOST_VALUE"} // "";
                @redactions = grep { length } ($target);
                if ($target =~ /\@([^:@\s]+)(?::\d+)?$/) {
                  push @redactions, $1;
                } elsif ($target =~ /^([^:@\s]+)(?::\d+)?$/) {
                  push @redactions, $1;
                }
              }
              for $value (@redactions) {
                s/\Q$value\E/[redacted-host]/g;
              }
            ' "$1"
          }

          print_sanitized_remote_output() {
            echo "dev-sim-prtests preflight failed. Sanitized remote output:"
            echo "----- ssh stdout -----"
            redact_remote_output "$ssh_stdout"
            echo "----- ssh stderr -----"
            redact_remote_output "$ssh_stderr"
          }

          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::Missing required repository secret DEV_SIM_PRTESTS_SSH_HOST"
            exit 1
          fi
          if [ -z "${SSH_KEY:-}" ]; then
            echo "::error::Missing required repository secret DEV_SIM_PRTESTS_SSH_KEY"
            exit 1
          fi

          key_file="$(mktemp)"
          ssh_stdout="$(mktemp)"
          ssh_stderr="$(mktemp)"
          trap 'rm -f "$key_file" "$ssh_stdout" "$ssh_stderr"; write_summary' EXIT
          printf '%s\n' "$SSH_KEY" > "$key_file"
          chmod 600 "$key_file"
          ls -l "$key_file"
          file "$key_file"
          head -n 2 "$key_file" | sed 's/./*/g'
          if ! ssh-keygen -y -f "$key_file" >/dev/null; then
            echo "SSH key validation failed"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if ! ssh \
            -i "$key_file" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o RemoteCommand=none \
            -o RequestTTY=no \
            "$SSH_HOST" \
            'set -euo pipefail
             hostname
             kubectl get ns lava-infra
             kubectl get deploy -n lava-infra
             kubectl get pods -n lava-infra' >"$ssh_stdout" 2>"$ssh_stderr"; then
            echo "::error::dev-sim-prtests preflight failed while connecting or running read-only checks"
            print_sanitized_remote_output
            exit 1
          fi

          preflight_result="passed"
          echo "dev-sim-prtests preflight passed"

      - name: Plan dev-sim-prtests deployment
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          ARTIFACT_NAME: ${{ steps.pr.outputs.artifact_name }}
          TARGET_ENVIRONMENT: dev-sim-prtests
          DRY_RUN: "true"
          CONCURRENCY_GROUP: pr-gate-dev-sim-prtests
        run: |
          set -euo pipefail
          echo "PR number: ${PR_NUMBER}"
          echo "PR head SHA: ${HEAD_SHA}"
          echo "artifact name: ${ARTIFACT_NAME}"
          echo "target environment: ${TARGET_ENVIRONMENT}"
          echo "dry-run: ${DRY_RUN}"
          echo "concurrency group: ${CONCURRENCY_GROUP}"
          echo "Deployment performed: false"
          echo "planned actions:"
          echo "1. wait for exclusive dev-sim-prtests workflow slot"
          echo "2. download PR artifact"
          echo "3. copy artifact to dev-sim-prtests"
          echo "4. reset test environment"
          echo "5. restart Smart Router with PR artifact"
          echo "6. wait for Smart Router readiness"

          {
            echo "### dev-sim-prtests deployment plan"
            echo ""
            echo "- PR number: \`${PR_NUMBER}\`"
            echo "- PR head SHA: \`${HEAD_SHA}\`"
            echo "- Artifact name: \`${ARTIFACT_NAME}\`"
            echo "- Target environment: \`${TARGET_ENVIRONMENT}\`"
            echo "- Dry-run: \`${DRY_RUN}\`"
            echo "- Concurrency group: \`${CONCURRENCY_GROUP}\`"
            echo "- Deployment performed: \`false\`"
            echo ""
            echo "Planned actions:"
            echo "1. wait for exclusive dev-sim-prtests workflow slot"
            echo "2. download PR artifact"
            echo "3. copy artifact to dev-sim-prtests"
            echo "4. reset test environment"
            echo "5. restart Smart Router with PR artifact"
            echo "6. wait for Smart Router readiness"
          } >> "$GITHUB_STEP_SUMMARY"
