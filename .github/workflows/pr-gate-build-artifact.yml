name: PR Gate - Dev Sim Preflight

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: pr-gate-dev-sim-prtests
  cancel-in-progress: false

jobs:
  metadata:
    name: Fetch PR metadata
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.pr.outputs.head_sha }}
      artifact_name: ${{ steps.pr.outputs.artifact_name }}
    steps:
      - name: Fetch PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          pr_json=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")
          head_sha=$(jq -r '.head.sha' <<< "$pr_json")
          head_repo=$(jq -r '.head.repo.full_name' <<< "$pr_json")
          if [ -z "$head_sha" ] || [ "$head_sha" = "null" ]; then
            echo "::error::Could not resolve head SHA for PR #${PR_NUMBER}"
            exit 1
          fi
          if [ -z "$head_repo" ] || [ "$head_repo" = "null" ]; then
            echo "::error::Could not resolve head repository for PR #${PR_NUMBER}"
            exit 1
          fi
          if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
            echo "::error::PR head repo must be ${GITHUB_REPOSITORY}, got ${head_repo}"
            exit 1
          fi
          short_sha="${head_sha:0:7}"
          artifact_name="smartrouter-pr-${PR_NUMBER}-${short_sha}-linux-amd64"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #${PR_NUMBER} head SHA: ${head_sha}"

  build:
    name: Build PR artifact
    runs-on: ubuntu-latest
    needs: metadata
    env:
      CGO_ENABLED: "0"
      GOOS: linux
      GOARCH: amd64
      GOAMD64: v3

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.head_sha }}
          fetch-depth: 0

      - name: Resolve version from git
        id: ver
        run: |
          set -euo pipefail
          v=$(git describe --tags --always --dirty)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build smartrouter
        run: |
          mkdir -p out
          GOWORK=off go build \
            -mod=readonly \
            -trimpath \
            -ldflags "-X github.com/magma-Devs/smart-router/version.Version=${{ steps.ver.outputs.version }} -X github.com/magma-Devs/smart-router/version.Commit=${{ needs.metadata.outputs.head_sha }} -w -s" \
            -o out/smartrouter ./cmd/smartrouter

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.metadata.outputs.artifact_name }}
          path: out/smartrouter

      - name: Write summary
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ needs.metadata.outputs.head_sha }}
          VERSION: ${{ steps.ver.outputs.version }}
          ARTIFACT_NAME: ${{ needs.metadata.outputs.artifact_name }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          {
            echo "### PR Gate artifact build"
            echo ""
            echo "- PR number: \`${PR_NUMBER}\`"
            echo "- PR head SHA: \`${HEAD_SHA}\`"
            echo "- Short SHA: \`${SHORT_SHA}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Artifact name: \`${ARTIFACT_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight dev-sim-prtests
        env:
          SSH_HOST: ${{ secrets.DEV_SIM_PRTESTS_SSH_HOST }}
          SSH_KEY: ${{ secrets.DEV_SIM_PRTESTS_SSH_KEY }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ needs.metadata.outputs.head_sha }}
          ARTIFACT_NAME: ${{ needs.metadata.outputs.artifact_name }}
        run: |
          set -euo pipefail
          preflight_result="failed"

          write_summary() {
            ssh_target="missing"
            if [ -n "${SSH_HOST:-}" ]; then
              ssh_target="configured"
            fi
            {
              echo "### dev-sim-prtests preflight"
              echo ""
              echo "- Target environment: \`dev-sim-prtests\`"
              echo "- SSH target: \`${ssh_target}\`"
              echo "- Artifact name: \`${ARTIFACT_NAME}\`"
              echo "- PR number: \`${PR_NUMBER}\`"
              echo "- PR head SHA: \`${HEAD_SHA}\`"
              echo "- Preflight result: \`${preflight_result}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          redact_remote_output() {
            SSH_HOST_VALUE="$SSH_HOST" perl -0pe '
              BEGIN {
                $target = $ENV{"SSH_HOST_VALUE"} // "";
                @redactions = grep { length } ($target);
                if ($target =~ /\@([^:@\s]+)(?::\d+)?$/) {
                  push @redactions, $1;
                } elsif ($target =~ /^([^:@\s]+)(?::\d+)?$/) {
                  push @redactions, $1;
                }
              }
              for $value (@redactions) {
                s/\Q$value\E/[redacted-host]/g;
              }
            ' "$1"
          }

          print_sanitized_remote_output() {
            echo "dev-sim-prtests preflight failed. Sanitized remote output:"
            echo "----- ssh stdout -----"
            redact_remote_output "$ssh_stdout"
            echo "----- ssh stderr -----"
            redact_remote_output "$ssh_stderr"
          }

          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::Missing required repository secret DEV_SIM_PRTESTS_SSH_HOST"
            exit 1
          fi
          if [ -z "${SSH_KEY:-}" ]; then
            echo "::error::Missing required repository secret DEV_SIM_PRTESTS_SSH_KEY"
            exit 1
          fi

          key_file="$(mktemp)"
          ssh_stdout="$(mktemp)"
          ssh_stderr="$(mktemp)"
          trap 'rm -f "$key_file" "$ssh_stdout" "$ssh_stderr"; write_summary' EXIT
          printf '%s\n' "$SSH_KEY" > "$key_file"
          chmod 600 "$key_file"
          if ! ssh-keygen -y -f "$key_file" >/dev/null; then
            echo "SSH key validation failed"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if ! ssh \
            -i "$key_file" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o RemoteCommand=none \
            -o RequestTTY=no \
            "$SSH_HOST" \
            'set -euo pipefail
             hostname
             kubectl get ns lava-infra
             kubectl get deploy -n lava-infra
             kubectl get pods -n lava-infra' >"$ssh_stdout" 2>"$ssh_stderr"; then
            echo "::error::dev-sim-prtests preflight failed while connecting or running read-only checks"
            print_sanitized_remote_output
            exit 1
          fi

          preflight_result="passed"
          echo "dev-sim-prtests preflight passed"

      - name: Validate dev-sim-prtests artifact
        env:
          SSH_HOST: ${{ secrets.DEV_SIM_PRTESTS_SSH_HOST }}
          SSH_KEY: ${{ secrets.DEV_SIM_PRTESTS_SSH_KEY }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ needs.metadata.outputs.head_sha }}
          VERSION: ${{ steps.ver.outputs.version }}
          ARTIFACT_NAME: ${{ needs.metadata.outputs.artifact_name }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::Missing required repository secret DEV_SIM_PRTESTS_SSH_HOST"
            exit 1
          fi
          if [ -z "${SSH_KEY:-}" ]; then
            echo "::error::Missing required repository secret DEV_SIM_PRTESTS_SSH_KEY"
            exit 1
          fi
          if [ ! -f out/smartrouter ]; then
            echo "::error::Missing built artifact out/smartrouter"
            exit 1
          fi

          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "$SSH_KEY" > "$key_file"
          chmod 600 "$key_file"
          if ! ssh-keygen -y -f "$key_file" >/dev/null; then
            echo "SSH key validation failed"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          remote_dir="/opt/smart-router-prtests/pr-${PR_NUMBER}/${HEAD_SHA}"
          remote_binary="${remote_dir}/smartrouter"
          ssh_opts=(-i "$key_file" -o StrictHostKeyChecking=accept-new -o BatchMode=yes -o RemoteCommand=none -o RequestTTY=no)
          scp_opts=(-i "$key_file" -o StrictHostKeyChecking=accept-new -o BatchMode=yes)

          if ! ssh "${ssh_opts[@]}" "$SSH_HOST" "mkdir -p '$remote_dir'" >/dev/null 2>&1; then
            echo "::error::Failed to create remote artifact directory"
            exit 1
          fi
          if ! scp "${scp_opts[@]}" out/smartrouter "${SSH_HOST}:${remote_binary}" >/dev/null 2>&1; then
            echo "::error::Failed to copy artifact to dev-sim-prtests"
            exit 1
          fi
          if ! ssh "${ssh_opts[@]}" "$SSH_HOST" "chmod +x '$remote_binary'" >/dev/null 2>&1; then
            echo "::error::Failed to chmod remote artifact"
            exit 1
          fi
          if ! version_output="$(ssh "${ssh_opts[@]}" "$SSH_HOST" "'$remote_binary' --version" 2>/dev/null)"; then
            echo "::error::Failed to execute remote artifact"
            exit 1
          fi
          if [[ "$version_output" != *"$HEAD_SHA"* && "$version_output" != *"$VERSION"* ]]; then
            echo "::error::Remote artifact version did not match expected version or commit"
            exit 1
          fi

          {
            echo "### dev-sim-prtests artifact validation"
            echo ""
            echo "- PR number: \`${PR_NUMBER}\`"
            echo "- PR head SHA: \`${HEAD_SHA}\`"
            echo "- Artifact name: \`${ARTIFACT_NAME}\`"
            echo "- Remote path: \`${remote_binary}\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Validation result: \`passed\`"
            echo "- Deployment performed: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"

  preflight-status:
    name: Publish dev-sim-prtests preflight status
    runs-on: ubuntu-latest
    needs: [metadata, build]
    if: ${{ always() }}
    steps:
      - name: Publish commit status
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.metadata.outputs.head_sha }}
          BUILD_RESULT: ${{ needs.build.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "$HEAD_SHA" ]; then
            echo "::error::Could not resolve head SHA for preflight status"
            exit 1
          fi

          state="failure"
          description="dev-sim-prtests preflight failed"
          if [ "$BUILD_RESULT" = "success" ]; then
            state="success"
            description="dev-sim-prtests preflight passed"
          fi

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$state" \
            -f context="dev-sim-prtests / preflight" \
            -f description="$description" \
            -f target_url="$RUN_URL"
