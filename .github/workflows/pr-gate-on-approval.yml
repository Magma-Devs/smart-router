name: Trigger PR Gate on Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  actions: write
  pull-requests: read

jobs:
  trigger-pr-gate:
    name: Trigger PR Gate
    runs-on: ubuntu-latest
    if: github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'main'
    steps:
      - name: Trigger PR Gate workflow
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh workflow run pr-gate-build-artifact.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f pr_number="$PR_NUMBER"
