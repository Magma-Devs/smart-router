name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # golangci-lint is currently advisory on this repo: the fork is on
      # Go 1.26 and earlier golangci-lint releases refuse to lint a newer
      # toolchain than they were built with. Once a stable v2.x is pinned
      # and known to produce a clean run against this codebase, drop the
      # continue-on-error flags on the retries.
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        id: lint_first_try
        with:
          version: latest
          args: --config .golangci.yml -v

      - name: Lint Retry 1
        if: steps.lint_first_try.outcome == 'failure'
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        id: lint_retry_1
        with:
          version: latest
          args: --config .golangci.yml -v

      - name: Lint Retry 2
        if: steps.lint_retry_1.outcome == 'failure'
        uses: golangci/golangci-lint-action@v9
        continue-on-error: true
        id: lint_retry_2
        with:
          version: latest
          args: --config .golangci.yml -v

  # Supply-chain vuln scan. Unlike golangci-lint above (advisory while the
  # Go 1.26 toolchain outpaces stable linter releases), this job GATES: a
  # known-vulnerable dependency or stdlib version should block the merge.
  # govulncheck is call-graph aware — it only flags advisories whose
  # vulnerable symbols are actually reachable from this codebase, so it
  # stays quiet on unreachable transitive CVEs.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # repo-checkout: false is required. Left on its default (true), the
      # action runs its own pinned actions/checkout@v4.1.1, whose bundled
      # git auth collides with the credentials our actions/checkout@v7 step
      # already set up — `remote: Duplicate header: "Authorization"` → HTTP
      # 400. We do checkout + Go setup with the repo-standard v7/v6 actions
      # above and let this step only run govulncheck.
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          repo-checkout: false
