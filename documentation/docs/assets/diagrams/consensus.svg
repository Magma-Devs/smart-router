<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cross-validation consensus: Smart Router fans out to three providers, two return matching response A, one returns disagreeing response B, threshold of two met">
  <defs>
    <linearGradient id="magmaC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6633"/>
      <stop offset="100%" stop-color="#FF3900"/>
    </linearGradient>
    <filter id="cGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#FF3900" flood-opacity="0.32"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .lbl  { font-family: Inter, system-ui, sans-serif; font-weight: 500; fill: #212630; font-size: 13px; }
    .lblw { font-family: Inter, system-ui, sans-serif; font-weight: 700; fill: #FFFFFF; font-size: 16px; }
    .sub  { font-family: Inter, system-ui, sans-serif; font-size: 11px; fill: #6b7280; }
    .pill { font-family: Inter, system-ui, sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.55; fill: #6b7280; }
  </style>

  <rect width="700" height="480" fill="#FFFFFF"/>

  <text x="350" y="36" text-anchor="middle" class="pill">CROSS-VALIDATION · THRESHOLD 2 OF 3</text>

  <rect x="270" y="200" width="160" height="80" rx="14" fill="url(#magmaC)" filter="url(#cGlow)"/>
  <text x="350" y="234" text-anchor="middle" class="lblw">Smart Router</text>
  <text x="350" y="256" text-anchor="middle" class="lblw" font-size="11" opacity="0.85" font-weight="500">fan-out · compare</text>

  <line x1="290" y1="210" x2="160" y2="120" stroke="#FF3900" stroke-opacity="0.6" stroke-width="2"/>
  <line x1="410" y1="210" x2="540" y2="120" stroke="#FF3900" stroke-opacity="0.6" stroke-width="2"/>
  <line x1="350" y1="290" x2="350" y2="380" stroke="#FF3900" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="3 3"/>

  <g>
    <rect x="60" y="80" width="180" height="80" rx="10" stroke="#212630" stroke-opacity="0.18" fill="#FFFFFF" stroke-width="1.5"/>
    <text x="80" y="108" class="lbl">Provider 1</text>
    <circle cx="218" cy="100" r="11" fill="#00b873"/>
    <path d="M 213 100 L 217 104 L 224 96" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <rect x="80" y="124" width="140" height="22" rx="4" fill="#00b873" fill-opacity="0.12" stroke="#00b873" stroke-width="1"/>
    <text x="150" y="139" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#00b873">response A</text>
  </g>

  <g>
    <rect x="460" y="80" width="180" height="80" rx="10" stroke="#212630" stroke-opacity="0.18" fill="#FFFFFF" stroke-width="1.5"/>
    <text x="480" y="108" class="lbl">Provider 2</text>
    <circle cx="618" cy="100" r="11" fill="#00b873"/>
    <path d="M 613 100 L 617 104 L 624 96" stroke="#FFFFFF" stroke-width="2" fill="none"/>
    <rect x="480" y="124" width="140" height="22" rx="4" fill="#00b873" fill-opacity="0.12" stroke="#00b873" stroke-width="1"/>
    <text x="550" y="139" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#00b873">response A</text>
  </g>

  <g opacity="0.55">
    <rect x="260" y="380" width="180" height="80" rx="10" stroke="#212630" stroke-opacity="0.18" fill="#FFFFFF" stroke-width="1.5"/>
    <text x="280" y="408" class="lbl">Provider 3</text>
    <circle cx="418" cy="400" r="11" fill="#d92d20"/>
    <line x1="413" y1="395" x2="423" y2="405" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="423" y1="395" x2="413" y2="405" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="280" y="424" width="140" height="22" rx="4" fill="#d92d20" fill-opacity="0.10" stroke="#d92d20" stroke-width="1"/>
    <text x="350" y="439" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="11" fill="#d92d20">response B</text>
  </g>
  <text x="455" y="430" class="sub" font-style="italic">ignored</text>

  <rect x="220" y="310" width="260" height="36" rx="18" fill="#00b873" fill-opacity="0.10" stroke="#00b873" stroke-width="1"/>
  <text x="350" y="333" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13" fill="#00b873">2 of 3 agree → return response A</text>
</svg>
